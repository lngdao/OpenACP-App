name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PNPM_VERSION: 9

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenACP Desktop ${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "Version: $VERSION"
          # Version format is YYYY.MDD.N (e.g. 2026.403.1) — already semver-compatible
          node -e "
            const fs = require('fs');
            const v = '$VERSION';
            // WiX3 MSI requires major ≤ 255. Convert YYYY.MDD.N → YY.MDD.N for WiX.
            const parts = v.split('.');
            const wixVersion = (parseInt(parts[0]) % 100) + '.' + parts.slice(1).join('.');
            // package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            // tauri.conf.json — set WiX version override for Windows MSI
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = v;
            if (!conf.bundle) conf.bundle = {};
            if (!conf.bundle.windows) conf.bundle.windows = {};
            if (!conf.bundle.windows.wix) conf.bundle.windows.wix = {};
            conf.bundle.windows.wix.version = wixVersion;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            // Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            console.log('Version:', v, '| WiX:', wixVersion);
          "

      # Auto-updater requires signed artifacts. Generate keys once with:
      #   pnpm tauri signer generate -w ~/.tauri/openacp.key
      # Then set these GitHub repo secrets:
      #   TAURI_SIGNING_PRIVATE_KEY       — contents of ~/.tauri/openacp.key
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password used during generation
      # The public key goes in src-tauri/tauri.conf.json plugins.updater.pubkey.
      # tauri-action automatically produces latest.json updater manifest when
      # createUpdaterArtifacts is set in tauri.conf.json and signing keys are present.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            })
