name: Nightly Build

on:
  schedule:
    - cron: "0 19 * * 1-5"  # 2AM GMT+7 (7PM UTC), Mon-Fri
  workflow_dispatch:          # Manual trigger — always builds, skips commit check

permissions:
  contents: write
  actions: write

env:
  PNPM_VERSION: 9

jobs:
  # ── Gate: skip if no new commits (cron only, manual always builds) ──
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Check for recent commits
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger — always build."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          RECENT=$(git log --since="24 hours ago" --oneline origin/develop | head -1)
          if [[ -z "$RECENT" ]]; then
            echo "No new commits in the last 24 hours. Skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "New commits found: $RECENT"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  # ── Clean old nightly release ──
  clean-release:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true

  # ── Build matrix (only if check passes) ──
  nightly:
    needs: [check, clean-release]
    if: needs.check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set nightly version
        shell: bash
        run: |
          YEAR=$(date -u +%Y)
          MMDD=$(date -u +%m%d | sed 's/^0*//')
          BASE="${YEAR}.${MMDD}"
          # Find highest N for today's date from existing tags
          N=0
          for tag in $(git tag -l "v${BASE}.*" 2>/dev/null); do
            PATCH=$(echo "$tag" | sed "s/v${BASE}\.\([0-9]*\).*/\1/")
            if [[ "$PATCH" =~ ^[0-9]+$ ]] && [ "$PATCH" -ge "$N" ]; then
              N=$((PATCH + 1))
            fi
          done
          NIGHTLY_VERSION="${BASE}.${N}-nightly.${GITHUB_RUN_NUMBER}"
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> $GITHUB_ENV
          echo "Nightly version: $NIGHTLY_VERSION"

          node -e "
            const fs = require('fs');
            const v = '$NIGHTLY_VERSION';
            // package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

            // Cargo.toml — semver pre-release is valid (e.g. 2026.407.1-nightly.42)
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
          "

      - name: Switch to nightly channel
        shell: bash
        env:
          UPDATER_ENDPOINT: ${{ secrets.NIGHTLY_UPDATER_ENDPOINT }}
          UPDATER_PUBKEY: ${{ secrets.UPDATER_PUBKEY }}
        run: ./scripts/set-channel.sh nightly

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          tagName: nightly
          releaseName: "Nightly ${{ env.NIGHTLY_VERSION }}"
          releaseBody: "Automated nightly build from develop branch. Version: ${{ env.NIGHTLY_VERSION }}"
          prerelease: true
          updaterJsonPreferNsis: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.platform }}-${{ matrix.rust_target }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
          retention-days: 14
          if-no-files-found: error
